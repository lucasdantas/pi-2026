#{extends 'main.html' /}
#{set title:'Listagem de Pessoa' /}

<a href="@{Pessoas.form}">Nova Pessoa</a>

#{list items:pessoas, as:'p'}
	<p>Nome: ${p.nome}</p>
	<p>Email: ${p.email}</p>
	<a href="@{Pessoas.editar(p.id)}" class="btn btn-secondary">Editar</a> |
	<a href="@{Pessoas.remover(p.id)}" class="btn btn-danger">Remover</a> |
	<a href="@{Pessoas.detalhar(p.id)}" class="btn btn-primary">Detalhar</a>
	<hr />
#{/list}
#{else}
	<p>Nenhuma pessoa cadastrada.</p>
#{/else}
